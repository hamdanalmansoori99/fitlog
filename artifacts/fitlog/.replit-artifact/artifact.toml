kind = "mobile"
previewPath = "/"
title = "FitLog"
version = "1.0.0"
id = "artifacts/fitlog"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
localPort = 21357
name = "expo"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/fitlog run dev"

[services.env]
PORT = "21357"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/fitlog", "run", "build"]
run = ["pnpm", "--filter", "@workspace/fitlog", "run", "serve"]
